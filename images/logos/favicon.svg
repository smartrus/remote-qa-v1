<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#10b981"/>
  <!-- Globe outline -->
  <circle cx="16" cy="16" r="11" stroke="#ffffff" stroke-width="2" fill="none"/>
  <!-- Equator -->
  <ellipse cx="16" cy="16" rx="11" ry="4" stroke="#ffffff" stroke-width="1.5" fill="none"/>
  <!-- Meridian -->
  <ellipse cx="16" cy="16" rx="4" ry="11" stroke="#ffffff" stroke-width="1.5" fill="none"/>
  <!-- Checkmark -->
  <polyline points="11,17 14,20 21,12" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
