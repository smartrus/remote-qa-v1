<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone body -->
  <rect x="5.5" y="1.5" width="13" height="21" rx="2.5"
    stroke="currentColor" stroke-width="1.5" fill="rgba(16,185,129,0.08)"/>
  <!-- Screen area -->
  <rect x="7.5" y="5" width="9" height="13" rx="0.5"
    stroke="currentColor" stroke-width="1" fill="none"/>
  <!-- Notch -->
  <line x1="10" y1="3.5" x2="14" y2="3.5"
    stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Home indicator -->
  <line x1="10" y1="20.5" x2="14" y2="20.5"
    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Checkmark on screen -->
  <polyline points="9.5,11.5 11,13.5 14.5,9"
    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
