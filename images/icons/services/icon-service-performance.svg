<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Speedometer arc -->
  <path d="M4 16.5a9 9 0 1 1 16 0"
    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Tick marks around arc -->
  <line x1="12" y1="3" x2="12" y2="5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="5.2" y1="6.7" x2="6.4" y2="7.9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="18.8" y1="6.7" x2="17.6" y2="7.9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="3" y1="12.5" x2="5" y2="12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="21" y1="12.5" x2="19" y2="12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Needle pointing high (fast performance) -->
  <line x1="12" y1="12" x2="16.5" y2="6.5"
    stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Center pivot -->
  <circle cx="12" cy="12" r="1.8" fill="currentColor"/>
  <!-- Base -->
  <line x1="3.5" y1="18" x2="20.5" y2="18"
    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
