<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle (universal access symbol) -->
  <circle cx="12" cy="12" r="10"
    stroke="currentColor" stroke-width="1.5" fill="rgba(16,185,129,0.08)"/>
  <!-- Accessibility figure: head -->
  <circle cx="12" cy="6" r="1.8"
    stroke="currentColor" stroke-width="1.4" fill="none"/>
  <!-- Body trunk -->
  <line x1="12" y1="7.8" x2="12" y2="14"
    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arms outstretched -->
  <line x1="7.5" y1="10.5" x2="16.5" y2="10.5"
    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="12" y1="14" x2="8.5" y2="19.5"
    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="12" y1="14" x2="15.5" y2="19.5"
    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
