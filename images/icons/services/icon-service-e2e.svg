<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser window -->
  <rect x="2" y="3" width="20" height="16" rx="2"
    stroke="currentColor" stroke-width="1.5" fill="rgba(16,185,129,0.08)"/>
  <!-- URL bar -->
  <line x1="2" y1="8" x2="22" y2="8"
    stroke="currentColor" stroke-width="1.5"/>
  <!-- Window dots -->
  <circle cx="5" cy="5.5" r="0.8" fill="currentColor"/>
  <circle cx="7.5" cy="5.5" r="0.8" fill="currentColor"/>
  <circle cx="10" cy="5.5" r="0.8" fill="currentColor"/>
  <!-- Flow arrow through browser (E2E path) -->
  <path d="M6 14h3l2-2.5 2 5 2-2.5h3"
    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow tip -->
  <polyline points="16.5,12 18,14 16.5,16"
    stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
